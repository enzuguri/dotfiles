- id: bourgeoisie-explicit-style
  prompt: "Do a code review of the recent changes — channel your inner British landed gentry."
  expected: "agent:bourgeoisie-reviewer"
  notes: |
    Novelty agent: must be explicitly requested. Prompt includes the trigger
    signal ("British landed gentry"). If this fails in open-world (loses to
    pr-review-toolkit:code-reviewer), the bourgeoisie description isn't
    distinctive enough.

- id: bourgeoisie-old-money-tone
  prompt: "Review my recent diff in the voice of restrained, old-money British understatement."
  expected: "agent:bourgeoisie-reviewer"
  notes: |
    Stylistic trigger: "old-money British understatement" matches the agent's
    description verbatim. Tests the description-trigger overlap.

- id: bourgeoisie-cosplay-explicit
  prompt: "Have the bourgeoisie-reviewer take a look at this PR — I want the dry, old-money understatement style."
  expected: "agent:bourgeoisie-reviewer"
  notes: |
    Direct name reference (kebab-case to match the agent's registry name
    exactly) plus stylistic cue. Bare name-only invocation with a space
    ("bourgeoisie reviewer") was noisy across samples — orchestrator
    appears to match registry names more reliably when referenced verbatim.
